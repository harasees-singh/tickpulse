<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Set the theme before CSS paints (no flash of the wrong theme). Mirrors
      // settings.ts: dark "Obsidian" is the default; only "daylight" opts out.
      try {
        var t = JSON.parse(localStorage.getItem('tickpulse.settings') || '{}').theme
        document.documentElement.dataset.theme = t === 'daylight' ? 'daylight' : 'obsidian'
      } catch (e) {
        document.documentElement.dataset.theme = 'obsidian'
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/tickpulse-icon.svg" />
    <title>TickPulse — Terminal v2.4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
